qq:
  app_id: "YOUR_APP_ID"
  app_secret: "YOUR_APP_SECRET"

feishu:
  app_id: "YOUR_FEISHU_APP_ID"
  app_secret: "YOUR_FEISHU_APP_SECRET"

claude:
  bin_path: "claude"
  timeout_seconds: 300
  max_timeout_seconds: 7200

memory:
  db_path: "data/bot.db"

images:
  cache_dir: ""       # 图片缓存目录，留空则不处理图片，例如 "F:\\qq-images"
  max_size_mb: 10     # 单张图片最大 MB，超过则跳过

allowlist: []  # 留空表示不限制，填写 QQ 号列表则只响应这些用户

log_level: "info"
